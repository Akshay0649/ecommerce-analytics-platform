x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__CORE__LOAD_EXAMPLES: "${AIRFLOW__CORE__LOAD_EXAMPLES:-False}"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    DBT_PROFILE_TARGET: ${DBT_PROFILE_TARGET:-dev}
    DBT_THREADS: ${DBT_THREADS:-4}
    SEED_NUM_CUSTOMERS: ${SEED_NUM_CUSTOMERS}
    SEED_NUM_PRODUCTS: ${SEED_NUM_PRODUCTS}
    SEED_NUM_ORDERS: ${SEED_NUM_ORDERS}
    SEED_NUM_SESSIONS: ${SEED_NUM_SESSIONS}
    SEED_RANDOM_STATE: ${SEED_RANDOM_STATE}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt:/opt/dbt
    - ./ingestion:/opt/ingestion
  depends_on:
    postgres:
      condition: service_healthy
    airflow-db:
      condition: service_healthy

services:

  # -------- Warehouse (Postgres acts as the analytical DB) --------
  postgres:
    image: postgres:15-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------- Airflow metadata DB (separate from warehouse) --------
  airflow-db:
    image: postgres:15-alpine
    container_name: ecom-airflow-db
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: ecom-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: ecom-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: ecom-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # -------- One-shot dbt runner (also invoked from Airflow) --------
  dbt:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: ecom-dbt
    profiles: ["tools"]
    working_dir: /opt/dbt
    environment:
      <<: *airflow-env
    volumes:
      - ./dbt:/opt/dbt
    entrypoint: ["dbt"]
    command: ["--version"]
    depends_on:
      postgres:
        condition: service_healthy

  # -------- Ingestion runner (synthetic source generation + load) --------
  ingest:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: ecom-ingest
    profiles: ["tools"]
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SEED_NUM_CUSTOMERS: ${SEED_NUM_CUSTOMERS}
      SEED_NUM_PRODUCTS: ${SEED_NUM_PRODUCTS}
      SEED_NUM_ORDERS: ${SEED_NUM_ORDERS}
      SEED_NUM_SESSIONS: ${SEED_NUM_SESSIONS}
      SEED_RANDOM_STATE: ${SEED_RANDOM_STATE}
    volumes:
      - ./ingestion:/app
    depends_on:
      postgres:
        condition: service_healthy

  # -------- BI --------
  metabase:
    image: metabase/metabase:v0.50.20
    container_name: ecom-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: ${MB_DB_TYPE:-h2}
      MB_SITE_NAME: ${MB_SITE_NAME}
    volumes:
      - ./metabase-data:/metabase.db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  airflow-db-data:
