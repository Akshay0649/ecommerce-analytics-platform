name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required so the deploy-pages job can publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; never cancel an in-flight one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: analytics
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U analytics"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      DBT_PROFILE_TARGET: ci
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
      SEED_NUM_CUSTOMERS: 200
      SEED_NUM_PRODUCTS: 50
      SEED_NUM_ORDERS: 800
      SEED_NUM_SESSIONS: 2000
      SEED_RANDOM_STATE: 7

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ingestion/requirements.txt
          pip install -r airflow/requirements.txt
          pip install ruff sqlfluff sqlfluff-templater-dbt pytest pre-commit

      - name: Ruff
        run: ruff check ingestion tests

      - name: Apply Postgres bootstrap
        run: |
          for f in sql/init/*.sql; do
            PGPASSWORD=$POSTGRES_PASSWORD psql \
              -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -f "$f"
          done

      - name: Seed raw layer
        run: |
          cd ingestion && python load_to_postgres.py

      - name: Pytest
        run: pytest -q

      - name: dbt deps
        run: cd dbt && dbt deps --target ci

      - name: dbt build (compile + run + test)
        run: cd dbt && dbt build --target ci

      - name: SQLFluff
        run: sqlfluff lint dbt/models --dialect postgres --templater jinja
        continue-on-error: true

      - name: dbt docs generate
        run: cd dbt && dbt docs generate --target ci

      - name: Stage dbt docs site for Pages
        run: |
          mkdir -p dbt-docs-site
          cp dbt/target/index.html        dbt-docs-site/
          cp dbt/target/manifest.json     dbt-docs-site/
          cp dbt/target/catalog.json      dbt-docs-site/
          cp dbt/target/run_results.json  dbt-docs-site/ || true

      - name: Upload dbt artifacts (run inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            dbt/target/manifest.json
            dbt/target/run_results.json
            dbt/target/catalog.json
          if-no-files-found: ignore

      - name: Upload Pages artifact (dbt docs site)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dbt-docs-site

  # Publishes the dbt docs site to GitHub Pages.
  # Requires Settings -> Pages -> Source = "GitHub Actions" (one-time).
  deploy-docs:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dbt docs to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
