[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["airflow/logs", "dbt/target", "dbt/dbt_packages"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N", "PT", "SIM", "RUF"]
ignore = ["E501"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
addopts = "-ra"
