ecommerce:
  target: "{{ env_var('DBT_PROFILE_TARGET', 'dev') }}"
  outputs:

    # ---------- local Postgres ----------
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'analytics') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'analytics') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'analytics') }}"
      schema: staging
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
      keepalives_idle: 0
      sslmode: prefer

    # ---------- ephemeral CI Postgres ----------
    ci:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'analytics') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'analytics') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'analytics') }}"
      schema: staging
      threads: 4

    # ---------- Snowflake (production swap) ----------
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', '') }}"
      user: "{{ env_var('SNOWFLAKE_USER', '') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD', '') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'TRANSFORMER') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_WH') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'ANALYTICS') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'DBT') }}"
      threads: 8
      query_tag: dbt_ecommerce_analytics
      client_session_keep_alive: false
